name = "blitz-edge-observer"
main = "worker.js"
compatibility_date = "2026-03-26"

kv_namespaces = [
  { binding = "GAME_STATE_KV", id = "24e9abb4d1e24822b38c5d1a1a50a657" }
]

[durable_objects]
bindings = [
  { name = "GAME_TRACKER_DO", class_name = "GameTrackerDO" }
]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["GameTrackerDO"]

[vars]
# Keep non-sensitive runtime config here only.
# WEBHOOK_SECRET_TOKEN must be provisioned via `wrangler secret put WEBHOOK_SECRET_TOKEN`.
# REQUIRE_JWT_AUTH: true/false gate for websocket JWT enforcement.
# JWT_SECRET must be provisioned via `wrangler secret put JWT_SECRET` when auth is enabled.
# JWT_ISSUER and JWT_AUDIENCE are optional strict claim checks.
# WS_ROLLOUT_PERCENT: 0-100 cohort rollout percentage for realtime websocket.
REQUIRE_JWT_AUTH = "false"
WS_ROLLOUT_PERCENT = "100"
JWT_ISSUER = ""
JWT_AUDIENCE = ""

[env.staging]
name = "blitz-edge-observer-staging"
kv_namespaces = [
  { binding = "GAME_STATE_KV", id = "fe24a0390c774c32a4a3585d1a5699ea" }
]

[env.staging.durable_objects]
bindings = [
  { name = "GAME_TRACKER_DO", class_name = "GameTrackerDO" }
]

[[env.staging.migrations]]
tag = "v2"
new_sqlite_classes = ["GameTrackerDO"]

[env.staging.vars]
REQUIRE_JWT_AUTH = "false"
WS_ROLLOUT_PERCENT = "100"
JWT_ISSUER = ""
JWT_AUDIENCE = ""
