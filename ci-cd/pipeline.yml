name: Blitz-Scale Edge Observer Deployment

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  terraform:
    name: "Terraform Infrastructure Deployment"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionDeploymentRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        working-directory: ./terraform/eks
        run: terraform init

      - name: Terraform Apply EKS & Karpenter
        working-directory: ./terraform/eks
        run: terraform apply -auto-approve

      - name: Terraform Apply Kinesis
        working-directory: ./terraform/kinesis
        run: terraform apply -auto-approve

  deploy-edge:
    name: "Deploy Cloudflare Worker"
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Edge Worker
        working-directory: ./edge
        run: wrangler deploy --env production
