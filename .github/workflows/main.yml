name: Blitz-Edge-Production-Pipeline

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      auto_approve:
        description: "Auto-approve Terraform apply?"
        required: false
        default: false
        type: boolean

concurrency:
  group: blitz-edge-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.11"

jobs:
  # ============================================
  # Phase 1: Quality Gates
  # ============================================
  quality-gate:
    name: "🔍 Lint & Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python Lint (Ruff)
        run: |
          pip install ruff
          ruff check .
          ruff format . --check

      - name: Create reports directory
        run: mkdir -p reports

      - name: Terraform Security Scan (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          github_token: ${{ github.token }}
          additional_args: --verbose --format sarif --out reports/tfsec.sarif

      - name: Terraform Security Scan (Checkov)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          soft_fail: true
          output_format: sarif
          output_file_path: reports/checkov.sarif

      - name: Node.js Lint & Build
        run: |
          cd edge && npm ci
          npm run lint
          npm run build --if-present

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: reports/

  # ============================================
  # Phase 2: Testing
  # ============================================
  test-gate:
    name: "🧪 Automated Testing"
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.6.0"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio aioredis boto3 pydantic kubernetes \
            aws-xray-sdk opentelemetry-api opentelemetry-sdk \
            opentelemetry-instrumentation-botocore aiohttp pytest-cov

      - name: Run unit tests with coverage
        run: |
          PYTHONPATH=. pytest tests/unit/ -v --cov=. --cov-report=xml --cov-report=html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  # ============================================
  # Phase 3: Terraform Plan (with approval)
  # ============================================
  terraform-plan:
    name: "📋 Terraform Plan"
    needs: test-gate
    runs-on: ubuntu-latest
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
      backend_ready: ${{ steps.init_eks.outputs.backend_ready }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.6.0"

      - name: Bash preflight (CI)
        env:
          CHECK_AWS_ROLE_ARN: "true"
          CHECK_CF_API_TOKEN: "true"
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: bash scripts/preflight-ci.sh

      - name: Build Lambda layer artifact
        run: |
          rm -rf /tmp/lambda_layer
          mkdir -p /tmp/lambda_layer/python
          cd /tmp/lambda_layer
          pip install --target=python \
            boto3 kubernetes botocore urllib3 certifi charset-normalizer \
            idna requests six python-dateutil pyyaml google-auth oauthlib \
            requests-oauthlib --quiet
          find python -name "*.pyc" -delete
          find python -name "__pycache__" -type d -exec rm -rf {} +
          find python -name "*.dist-info" -type d -exec rm -rf {} +
          zip -r lambda_layer.zip python/ -q
          mv lambda_layer.zip "${GITHUB_WORKSPACE}/terraform/eks/lambda_layer.zip"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (EKS)
        id: init_eks
        run: |
          cd terraform/eks
          if terraform init; then
            echo "backend_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Plan
        id: plan
        run: |
          cd terraform/eks
          if [ "${{ steps.init_eks.outputs.backend_ready }}" != "true" ]; then
            echo "Remote backend is not accessible; writing placeholder plan artifact for CI continuity."
            touch tfplan
            echo "exitcode=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          set +e
          terraform plan -lock-timeout=10m -out=tfplan -detailed-exitcode
          exitcode=$?
          set -e
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          # Exit 0 to continue workflow, but capture exit code for conditional jobs
          # Exit codes: 0=no changes, 1=error, 2=changes present
          if [ $exitcode -eq 1 ]; then
            exit 1  # Only fail on actual errors
          fi

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            terraform/eks/tfplan
            terraform/eks/lambda_layer.zip
            terraform/eks/scheduled_scaler.zip

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request' && steps.plan.outputs.exitcode != '1'
        uses: actions/github-script@v6
        with:
          script: |
            const output = `#### Terraform Plan Success
            <details><summary>Show Plan</summary>
            Terraform plan completed successfully with no changes or additions.
            </details>
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # ============================================
  # Phase 4: Staging Deployment
  # ============================================
  deploy-staging:
    name: "🚀 Deploy to Staging"
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && needs.terraform-plan.outputs.backend_ready == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.6.0"

      - name: Bash preflight (CI)
        env:
          CHECK_AWS_ROLE_ARN: "true"
          CHECK_CF_API_TOKEN: "true"
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: bash scripts/preflight-ci.sh

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: terraform/eks/

      - name: Configure kubeconfig (Staging)
        run: aws eks update-kubeconfig --name blitz-edge-cluster --region ${{ env.AWS_REGION }}

      - name: Terraform Apply (Staging)
        run: |
          cd terraform/eks
          terraform init
          terraform apply -lock-timeout=10m -auto-approve tfplan

      - name: Deploy Worker (Staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: "edge"
          environment: "staging"

      - name: Smoke Test Staging
        run: |
          curl -fsS --retry 3 --retry-delay 2 https://blitz-edge-observer-staging.kindsonegbule15.workers.dev/health

  # ============================================
  # Phase 5: Production Deployment (with approval)
  # ============================================
  deploy-production:
    name: "🚀 Deploy to Production"
    needs: [terraform-plan, deploy-staging]
    if: github.ref == 'refs/heads/main' && needs.terraform-plan.outputs.backend_ready == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.6.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: terraform/eks/

      - name: Configure kubeconfig (Production)
        run: aws eks update-kubeconfig --name blitz-edge-cluster --region ${{ env.AWS_REGION }}

      - name: Terraform Apply (Production)
        run: |
          cd terraform/eks
          terraform init
          terraform plan -lock-timeout=10m -out=tfplan-prod
          terraform apply -lock-timeout=10m -auto-approve tfplan-prod

      - name: Deploy Worker (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: "edge"
          environment: "production"

      - name: Post-Deploy Smoke Test
        run: |
          curl -fsS --retry 3 --retry-delay 2 https://blitz-edge-observer.kindsonegbule15.workers.dev/health
          echo "✅ Production deployment successful"

      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Production deployment ${{ job.status }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
